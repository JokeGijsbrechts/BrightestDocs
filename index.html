<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brightest — Waar vind ik mijn document?</title>
<style>
  body { margin: 0; padding: 32px 16px; background: #f5f4f0; font-family: Arial, Helvetica, sans-serif; display: flex; flex-direction: column; align-items: center; }
  h1 { font-size: 16px; font-weight: 600; color: #2C2C2A; margin: 0 0 24px; letter-spacing: 0.01em; }
  svg a { cursor: pointer; }
  svg a:hover rect { filter: brightness(0.95); }
</style>
</head>
<body>
<h1>Brightest — Waar vind ik mijn document?</h1>
<svg width="100%" viewBox="0 0 680 800" xmlns="http://www.w3.org/2000/svg" style="max-width:680px">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── Wat zoek je? ── centered top -->
  <rect x="240" y="24" width="200" height="40" rx="20" fill="#e8e6df" stroke="#888" stroke-width="0.5"/>
  <text font-size="14" font-weight="600" fill="#2C2C2A" x="340" y="44" text-anchor="middle" dominant-baseline="central">Wat zoek je?</text>

  <!-- Arrow left → HubSpot -->
  <path d="M240 44 L160 44 L160 108" fill="none" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#555" x="196" y="28" text-anchor="middle">Onepagers /</text>
  <text font-size="12" fill="#555" x="196" y="42" text-anchor="middle">Company pres</text>

  <!-- Arrow right → Teams -->
  <path d="M440 44 L530 44 L530 108" fill="none" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#555" x="488" y="36" text-anchor="middle">HR / Sales template</text>

  <!-- HubSpot box  x=60..340 center=200 -->
  <a href="https://app-eu1.hubspot.com/documents/26991405" target="_blank">
    <rect x="60" y="108" width="280" height="60" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
    <text font-size="14" font-weight="600" fill="#085041" x="200" y="128" text-anchor="middle" dominant-baseline="central">HubSpot Documenten ↗</text>
    <text font-size="12" fill="#0f6e56" x="200" y="150" text-anchor="middle" dominant-baseline="central">Onepagers &amp; company pres</text>
  </a>

  <!-- Teams Templates box  x=410..610 center=510 -->
  <a href="https://brightest.sharepoint.com/:f:/s/PRIVATEBrightestTemplates/IgBKGfCV1qqGT7PBFBIMpe5BAblpLjFhwocnHzekb0T1T-Y?e=80I2a9" target="_blank">
    <rect x="410" y="108" width="200" height="60" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
    <text font-size="14" font-weight="600" fill="#0c447c" x="510" y="128" text-anchor="middle" dominant-baseline="central">Teams Templates ↗</text>
    <text font-size="12" fill="#185fa5" x="510" y="150" text-anchor="middle" dominant-baseline="central">HR &amp; Sales docs</text>
  </a>

  <!-- HubSpot → Onepager (left branch, center=110) -->
  <path d="M110 168 L110 220" fill="none" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- HubSpot → Company pres (right branch, center=290) -->
  <path d="M290 168 L290 220" fill="none" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Onepager box  x=50..190 center=120 -->
  <rect x="50" y="220" width="140" height="44" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text font-size="14" font-weight="600" fill="#085041" x="120" y="242" text-anchor="middle" dominant-baseline="central">Onepager</text>

  <!-- Company pres box  x=210..390 center=300 -->
  <rect x="210" y="220" width="160" height="44" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text font-size="14" font-weight="600" fill="#085041" x="290" y="242" text-anchor="middle" dominant-baseline="central">Company pres</text>

  <!-- Onepager → PDF  center=100 -->
  <path d="M120 264 L100 320" fill="none" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Company pres → Delen (PDF)  center=250 -->
  <path d="M260 264 L250 320" fill="none" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#555" x="238" y="300" text-anchor="end">Delen</text>

  <!-- Company pres → Aanpassen (PPTX)  center=370 -->
  <path d="M320 264 L370 320" fill="none" stroke="#444" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#555" x="355" y="300" text-anchor="start">Aanpassen</text>

  <!-- PDF box voor Onepager  x=40..160 center=100 -->
  <rect x="40" y="320" width="120" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text font-size="14" font-weight="600" fill="#085041" x="100" y="340" text-anchor="middle" dominant-baseline="central">PDF</text>
  <text font-size="12" fill="#0f6e56" x="100" y="358" text-anchor="middle" dominant-baseline="central">Link kopiëren</text>

  <!-- PDF box voor Delen  x=190..310 center=250 -->
  <rect x="190" y="320" width="120" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text font-size="14" font-weight="600" fill="#085041" x="250" y="340" text-anchor="middle" dominant-baseline="central">PDF</text>
  <text font-size="12" fill="#0f6e56" x="250" y="358" text-anchor="middle" dominant-baseline="central">Link kopiëren</text>

  <!-- PPTX box voor Aanpassen  x=310..430 center=370 -->
  <rect x="310" y="320" width="120" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text font-size="14" font-weight="600" fill="#085041" x="370" y="340" text-anchor="middle" dominant-baseline="central">PPTX</text>
  <text font-size="12" fill="#0f6e56" x="370" y="358" text-anchor="middle" dominant-baseline="central">Download</text>

  <!-- ── Divider: enkel voor HubSpot ── -->
  <line x1="30" y1="448" x2="650" y2="448" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text font-size="11" fill="#aaa" x="340" y="441" text-anchor="middle">enkel voor HubSpot</text>

  <!-- Amber: eigen docs uploaden -->
  <rect x="30" y="456" width="620" height="60" rx="8" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
  <text font-size="14" font-weight="600" fill="#633806" x="340" y="476" text-anchor="middle" dominant-baseline="central">Eigen docs uploaden?</text>
  <text font-size="12" fill="#854f0b" x="340" y="498" text-anchor="middle" dominant-baseline="central">3. Team Sales → jouw naam</text>

  <!-- Red: niet uploaden -->
  <rect x="30" y="532" width="620" height="52" rx="8" fill="#fcebeb" stroke="#a32d2d" stroke-width="0.5"/>
  <text font-size="14" font-weight="600" fill="#791f1f" x="340" y="550" text-anchor="middle" dominant-baseline="central">⚠ Niet uploaden onder</text>
  <text font-size="12" fill="#a32d2d" x="340" y="570" text-anchor="middle" dominant-baseline="central">1. Onepagers of 2. Company pres</text>

  <!-- Amber: under construction -->
  <rect x="30" y="600" width="620" height="52" rx="8" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
  <text font-size="14" font-weight="600" fill="#633806" x="340" y="618" text-anchor="middle" dominant-baseline="central">Onepager niet beschikbaar?</text>
  <text font-size="12" fill="#854f0b" x="340" y="638" text-anchor="middle" dominant-baseline="central">Under construction — nog niet klaar</text>

  <!-- ── Divider: algemeen ── -->
  <line x1="30" y1="668" x2="650" y2="668" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text font-size="11" fill="#aaa" x="340" y="661" text-anchor="middle">algemeen</text>

  <!-- Red: andere locaties -->
  <rect x="30" y="676" width="620" height="52" rx="8" fill="#fcebeb" stroke="#a32d2d" stroke-width="0.5"/>
  <text font-size="14" font-weight="600" fill="#791f1f" x="340" y="694" text-anchor="middle" dominant-baseline="central">⚠ Teams/andere locaties</text>
  <text font-size="12" fill="#a32d2d" x="340" y="714" text-anchor="middle" dominant-baseline="central">= niet de officiële versie</text>

  <!-- Legend -->
  <rect x="30" y="744" width="620" height="28" rx="8" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text font-size="11" fill="#888" x="340" y="758" text-anchor="middle" dominant-baseline="central">Officiële bronnen: HubSpot Documenten (onepagers/pres) · Teams Templates (HR &amp; Sales)</text>
</svg>
</body>
</html>
